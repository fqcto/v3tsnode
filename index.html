<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>v3tsnode · 初级 → 中级 → 高级 全阶技术知识库</title>

<!-- 第三方：Markdown 渲染 + 代码高亮 + Mermaid（无需安装，CDN 直引） -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
<link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />

<style>
  :root {
    --bg: #0f172a;
    --bg-soft: #111c33;
    --panel: #0b1426;
    --border: #1f2a44;
    --fg: #e2e8f0;
    --fg-dim: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #a78bfa;
    --accent-3: #34d399;
    --code-bg: #0a1020;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
    --radius: 10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f8fafc;
      --bg-soft: #ffffff;
      --panel: #ffffff;
      --border: #e2e8f0;
      --fg: #0f172a;
      --fg-dim: #475569;
      --accent: #0284c7;
      --accent-2: #7c3aed;
      --accent-3: #059669;
      --code-bg: #0d1117;
      --shadow: 0 6px 18px rgba(15,23,42,.08);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 15px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    color: var(--fg);
    background: var(--bg);
    display: grid;
    grid-template-columns: 280px 1fr 260px;
    grid-template-rows: 56px 1fr;
    grid-template-areas:
      "header header header"
      "side   main   toc";
  }
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
    color: #fff;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  header .logo {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: .5px;
  }
  header .badge {
    background: rgba(255,255,255,.15);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
  }
  header .spacer { flex: 1; }
  header input {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 8px;
    color: #fff;
    padding: 6px 10px;
    width: 240px;
    outline: none;
  }
  header input::placeholder { color: rgba(255,255,255,.7); }
  header a {
    color: #fff;
    text-decoration: none;
    background: rgba(255,255,255,.15);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  header a:hover { background: rgba(255,255,255,.25); }

  aside.sidebar {
    grid-area: side;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px 10px;
  }
  .sidebar h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-dim);
    margin: 14px 12px 6px;
  }
  .sidebar .group-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--accent-2);
    margin: 14px 12px 4px;
    padding-bottom: 4px;
    border-bottom: 1px dashed var(--border);
  }
  /* 章节难度徽章：在 markdown 里用 <span class="lv lv-1"> 等 */
  .markdown .lv {
    display: inline-block;
    font-size: 11px;
    padding: 1px 8px;
    margin-right: 6px;
    border-radius: 999px;
    font-weight: 700;
    vertical-align: middle;
  }
  .markdown .lv-1 { background: rgba(52,211,153,.18); color: #34d399; border: 1px solid rgba(52,211,153,.4); }
  .markdown .lv-2 { background: rgba(56,189,248,.18); color: #38bdf8; border: 1px solid rgba(56,189,248,.4); }
  .markdown .lv-3 { background: rgba(236,72,153,.18); color: #f472b6; border: 1px solid rgba(236,72,153,.4); }
  .sidebar .doc {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--fg);
    user-select: none;
    transition: background .15s;
  }
  .sidebar .doc:hover { background: var(--bg-soft); }
  .sidebar .doc.active {
    background: linear-gradient(90deg, rgba(56,189,248,.18), transparent);
    color: var(--accent);
    border-left: 3px solid var(--accent);
    padding-left: 9px;
  }
  .sidebar .doc .ico {
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px;
    background: var(--bg-soft);
    font-size: 13px;
    font-weight: 700;
  }
  .sidebar .doc .meta { font-size: 11px; color: var(--fg-dim); }

  aside.toc {
    grid-area: toc;
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
    font-size: 13px;
  }
  .toc h4 {
    margin: 0 0 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-dim);
  }
  .toc a {
    display: block;
    padding: 4px 8px;
    border-radius: 6px;
    color: var(--fg-dim);
    text-decoration: none;
    border-left: 2px solid transparent;
    line-height: 1.5;
  }
  .toc a:hover { color: var(--fg); background: var(--bg-soft); }
  .toc a.h2 { font-weight: 600; color: var(--fg); }
  .toc a.h3 { padding-left: 18px; }
  .toc a.h4 { padding-left: 28px; font-size: 12px; }
  .toc a.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(56,189,248,.08);
  }

  main {
    grid-area: main;
    overflow-y: auto;
    padding: 28px 48px 80px;
    scroll-behavior: smooth;
  }
  .markdown {
    max-width: 880px;
    margin: 0 auto;
  }
  .markdown h1, .markdown h2, .markdown h3, .markdown h4 {
    line-height: 1.3;
    margin: 1.6em 0 .6em;
    scroll-margin-top: 70px;
  }
  .markdown h1 {
    font-size: 28px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 10px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .markdown h2 {
    font-size: 22px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  .markdown h3 { font-size: 18px; color: var(--accent-3); }
  .markdown h4 { font-size: 15px; color: var(--accent-2); }
  .markdown p, .markdown li { color: var(--fg); }
  .markdown a { color: var(--accent); text-decoration: none; }
  .markdown a:hover { text-decoration: underline; }
  .markdown blockquote {
    border-left: 4px solid var(--accent);
    background: var(--bg-soft);
    margin: 14px 0;
    padding: 10px 14px;
    color: var(--fg-dim);
    border-radius: 0 8px 8px 0;
  }
  .markdown code {
    background: var(--bg-soft);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    color: #f472b6;
  }
  .markdown pre {
    background: var(--code-bg);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: relative;
  }
  .markdown pre code {
    background: transparent;
    padding: 0;
    color: #e2e8f0;
    font-size: 13px;
  }
  .markdown pre .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(255,255,255,.08);
    color: #cbd5e1;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 5px;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s;
  }
  .markdown pre:hover .copy-btn { opacity: 1; }
  .markdown pre .copy-btn:hover { background: rgba(56,189,248,.3); }
  .markdown table {
    border-collapse: collapse;
    margin: 12px 0;
    width: 100%;
    font-size: 14px;
  }
  .markdown th, .markdown td {
    border: 1px solid var(--border);
    padding: 8px 12px;
  }
  .markdown th {
    background: var(--bg-soft);
    text-align: left;
    color: var(--accent);
  }
  .markdown tr:nth-child(2n) td { background: var(--bg-soft); }
  .markdown hr { border: none; border-top: 1px dashed var(--border); margin: 28px 0; }
  .markdown ul, .markdown ol { padding-left: 26px; }
  .markdown li { margin: 4px 0; }

  .empty, .loading, .error {
    text-align: center;
    color: var(--fg-dim);
    padding: 80px 20px;
  }
  .error {
    background: rgba(239,68,68,.08);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 12px;
    padding: 24px;
    margin: 40px auto;
    max-width: 720px;
    text-align: left;
    color: #fca5a5;
  }
  .error h3 { color: #fca5a5; margin-top: 0; }
  .error code, .error pre {
    background: rgba(0,0,0,.4);
    padding: 2px 6px;
    border-radius: 4px;
    color: #fcd34d;
  }
  .error pre {
    padding: 10px 14px;
    margin: 10px 0;
    overflow-x: auto;
    font-size: 13px;
  }

  .search-hl { background: rgba(250,204,21,.4); color: inherit; border-radius: 2px; }

  /* 锚点小图标 */
  .anchor {
    visibility: hidden;
    margin-left: 6px;
    color: var(--fg-dim);
    text-decoration: none;
    font-weight: normal;
    font-size: .8em;
  }
  h1:hover .anchor, h2:hover .anchor, h3:hover .anchor, h4:hover .anchor { visibility: visible; }

  /* 进度条 */
  .progress {
    position: fixed;
    top: 56px; left: 280px; right: 260px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transform-origin: left;
    transform: scaleX(0);
    z-index: 5;
    transition: transform .1s;
  }

  @media (max-width: 1100px) {
    body { grid-template-columns: 240px 1fr; grid-template-areas: "header header" "side main"; }
    aside.toc { display: none; }
    .progress { right: 0; left: 240px; }
  }
  @media (max-width: 760px) {
    body { grid-template-columns: 1fr; grid-template-areas: "header" "main"; }
    aside.sidebar { display: none; }
    .progress { left: 0; }
    main { padding: 16px; }
    header input { width: 140px; }
  }
</style>
</head>

<body>
<header>
  <span class="logo">📚 v3tsnode</span>
  <span class="badge" id="docTitleBadge">前端基础 / 框架 / 后端 / 多端 · 初 → 中 → 高</span>
  <div class="spacer"></div>
  <input id="search" type="search" placeholder="🔍 搜索当前文档…" />
  <a href="https://marked.js.org/" target="_blank" rel="noreferrer">marked</a>
  <a href="https://highlightjs.org/" target="_blank" rel="noreferrer">hl.js</a>
</header>

<aside class="sidebar">
  <h3>📖 技术文档</h3>
  <div id="docList"></div>
  <h3>🚀 关于</h3>
  <div style="padding:8px 12px;font-size:12px;color:var(--fg-dim);line-height:1.7">
    本知识库覆盖 <strong style="color:var(--fg)">初级 → 中级 → 高级</strong> 全阶段路线，
    含 HTML5 / CSS3 / JS / Vue / TS / Node / Express / MySQL / 小程序 / uni-app。<br/><br/>
    💡 双击 <code>index.html</code> 打开；<br/>
    若 Markdown 加载失败，请改用本地服务器（见下方报错提示）。
  </div>
</aside>

<div class="progress" id="progress"></div>

<main id="main">
  <div class="loading">⏳ 加载中…</div>
</main>

<aside class="toc">
  <h4>📑 当前文档目录</h4>
  <div id="toc"></div>
</aside>

<script>
  // 按【分组】组织文档：前端基础 → 框架/语言 → 后端 → 多端
  const GROUPS = [
    {
      title: '🌐 前端基础（初 → 高）',
      docs: [
        { id: 'html5',      file: 'docs/html5.md',      label: 'HTML5',       icon: 'H', meta: '语义化 / 表单 / 多媒体 / API' },
        { id: 'css3',       file: 'docs/css3.md',       label: 'CSS3',        icon: 'C', meta: '盒模型 / Flex / Grid / 动画' },
        { id: 'javascript', file: 'docs/javascript.md', label: 'JavaScript',  icon: 'J', meta: '语法 / 异步 / 原型 / EventLoop' },
      ],
    },
    {
      title: '⚡ 框架 & 语言（中 → 高）',
      docs: [
        { id: 'vue3',       file: 'docs/vue3.md',       label: 'Vue 3',       icon: 'V', meta: '入门 → 响应式源码 / Pinia' },
        { id: 'typescript', file: 'docs/typescript.md', label: 'TypeScript',  icon: 'T', meta: '入门 → 泛型 / 类型体操' },
      ],
    },
    {
      title: '🛠️ 后端 & 数据库',
      docs: [
        { id: 'nodejs',     file: 'docs/nodejs.md',     label: 'Node.js',     icon: 'N', meta: '入门 → 事件循环 / 流 / 性能' },
        { id: 'express',    file: 'docs/express.md',    label: 'Express',     icon: 'E', meta: '入门 → 中间件 / 安全 / SSE' },
        { id: 'mysql',      file: 'docs/mysql.md',      label: 'MySQL',       icon: 'M', meta: '入门 → InnoDB / MVCC / 调优' },
      ],
    },
    {
      title: '📱 多端 & 小程序',
      docs: [
        { id: 'wxmini',     file: 'docs/wxmini.md',     label: '微信小程序',   icon: '微', meta: '原生 · 入门 → 性能 / 分包' },
        { id: 'uniapp',     file: 'docs/uniapp.md',     label: 'uni-app',      icon: 'U', meta: '多端 · 入门 → 条件编译 / 优化' },
      ],
    },
  ]

  // 扁平列表，供 loadDoc 查找
  const DOCS = GROUPS.flatMap(g => g.docs)

  // ---- marked 配置 ----
  const renderer = new marked.Renderer()
  const slug = s => s.toString().trim().toLowerCase()
    .replace(/[\s　]+/g, '-')
    .replace(/[^\w一-龥\-]+/g, '')
    .replace(/-+/g, '-')

  renderer.heading = function(text, level, raw) {
    const id = slug(raw)
    return `<h${level} id="${id}">${text}<a class="anchor" href="#${id}">#</a></h${level}>`
  }
  marked.setOptions({
    renderer,
    gfm: true,
    breaks: false,
    highlight(code, lang) {
      try {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value
        }
        return hljs.highlightAuto(code).value
      } catch { return code }
    }
  })

  // ---- DOM ----
  const $main   = document.getElementById('main')
  const $list   = document.getElementById('docList')
  const $toc    = document.getElementById('toc')
  const $search = document.getElementById('search')
  const $badge  = document.getElementById('docTitleBadge')
  const $prog   = document.getElementById('progress')

  // ---- 渲染 sidebar（按分组） ----
  function renderDocList(activeId) {
    $list.innerHTML = ''
    GROUPS.forEach(group => {
      const gt = document.createElement('div')
      gt.className = 'group-title'
      gt.textContent = group.title
      $list.appendChild(gt)
      group.docs.forEach(d => {
        const el = document.createElement('div')
        el.className = 'doc' + (d.id === activeId ? ' active' : '')
        el.innerHTML = `
          <span class="ico">${d.icon}</span>
          <div>
            <div>${d.label}</div>
            <div class="meta">${d.meta}</div>
          </div>`
        el.onclick = () => location.hash = '#/' + d.id
        $list.appendChild(el)
      })
    })
  }

  // ---- 加载 + 渲染 markdown ----
  async function loadDoc(id) {
    const doc = DOCS.find(d => d.id === id) || DOCS[0]
    renderDocList(doc.id)
    $badge.textContent = doc.label + ' · 初 → 中 → 高 全阶段'
    $main.innerHTML = '<div class="loading">⏳ 正在加载 ' + doc.file + ' …</div>'
    $toc.innerHTML = ''

    let raw
    try {
      const res = await fetch(doc.file, { cache: 'no-cache' })
      if (!res.ok) throw new Error('HTTP ' + res.status)
      raw = await res.text()
    } catch (e) {
      $main.innerHTML = renderError(doc.file, e)
      return
    }

    const html = marked.parse(raw)
    $main.innerHTML = '<article class="markdown">' + html + '</article>'

    // 复制按钮
    $main.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button')
      btn.className = 'copy-btn'
      btn.textContent = '复制'
      btn.onclick = () => {
        navigator.clipboard.writeText(pre.querySelector('code').innerText)
          .then(() => { btn.textContent = '✓ 已复制'; setTimeout(() => btn.textContent = '复制', 1200) })
      }
      pre.appendChild(btn)
    })

    buildToc()
    handleSearch()
    // 滚动到 hash 锚点
    if (location.hash.includes('#', 1)) {
      const sub = location.hash.split('#').slice(2).join('#')
      if (sub) {
        const el = document.getElementById(decodeURIComponent(sub))
        el && el.scrollIntoView()
      }
    } else {
      $main.scrollTop = 0
    }
  }

  function renderError(file, e) {
    const isFile = location.protocol === 'file:'
    return `
      <div class="error">
        <h3>❌ 加载失败：${file}</h3>
        <p>原始错误：<code>${e.message}</code></p>
        ${isFile ? `
        <p>检测到当前是 <code>file://</code> 协议打开本页面。多数浏览器（Chrome / Edge）会出于安全考虑禁止本地 <code>fetch()</code> 读取同目录文件。</p>
        <p>请使用以下任一方式启动一个本地静态服务器：</p>
        <pre># 方式 1：Node 自带（项目根目录）
node serve.js

# 方式 2：npx 一行启动
npx serve .

# 方式 3：Python
python -m http.server 8080

# 方式 4：VSCode 插件 "Live Server" 右键 → Open with Live Server</pre>
        <p>然后浏览器打开 <code>http://localhost:8080</code> 即可。</p>` : `
        <p>请确认文件存在且服务器可访问。</p>`}
      </div>`
  }

  // ---- TOC ----
  let tocLinks = []
  function buildToc() {
    const hs = $main.querySelectorAll('h2, h3, h4')
    $toc.innerHTML = ''
    tocLinks = []
    hs.forEach(h => {
      const a = document.createElement('a')
      a.href = '#' + location.hash.split('#')[1] + '#' + h.id
      a.className = h.tagName.toLowerCase()
      a.textContent = h.textContent.replace(/#$/, '')
      a.onclick = ev => {
        ev.preventDefault()
        h.scrollIntoView({ behavior: 'smooth', block: 'start' })
        history.replaceState(null, '', a.getAttribute('href'))
      }
      $toc.appendChild(a)
      tocLinks.push({ a, el: h })
    })
  }

  // ---- 滚动联动 ----
  $main.addEventListener('scroll', () => {
    const top = $main.scrollTop
    const max = $main.scrollHeight - $main.clientHeight
    $prog.style.transform = `scaleX(${max > 0 ? top / max : 0})`
    let active = null
    for (const { a, el } of tocLinks) {
      if (el.offsetTop - 80 <= top) active = a
      else break
    }
    tocLinks.forEach(({ a }) => a.classList.toggle('active', a === active))
  })

  // ---- 搜索 ----
  function handleSearch() {
    const q = $search.value.trim()
    const article = $main.querySelector('.markdown')
    if (!article) return
    // 清除上次高亮
    article.querySelectorAll('mark.search-hl').forEach(m => {
      const t = document.createTextNode(m.textContent)
      m.parentNode.replaceChild(t, m)
    })
    article.normalize()
    if (!q) return
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi')

    // 仅在文本节点中替换
    const walker = document.createTreeWalker(article, NodeFilter.SHOW_TEXT, {
      acceptNode: n => /^(SCRIPT|STYLE|CODE|PRE)$/.test(n.parentNode.tagName)
        ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT
    })
    const nodes = []
    while (walker.nextNode()) nodes.push(walker.currentNode)
    let firstHit = null
    nodes.forEach(n => {
      if (!re.test(n.nodeValue)) return
      const span = document.createElement('span')
      span.innerHTML = n.nodeValue.replace(re, m => `<mark class="search-hl">${m}</mark>`)
      n.parentNode.replaceChild(span, n)
      if (!firstHit) firstHit = span
    })
    if (firstHit) firstHit.scrollIntoView({ behavior: 'smooth', block: 'center' })
  }

  let st
  $search.addEventListener('input', () => {
    clearTimeout(st)
    st = setTimeout(handleSearch, 200)
  })

  // ---- 路由 ----
  function route() {
    const hash = location.hash || '#/vue3'
    const id = hash.split('#')[1]?.replace(/^\//, '') || 'vue3'
    loadDoc(id)
  }
  window.addEventListener('hashchange', route)
  route()
</script>
</body>
</html>
